appId: com.eventplayer.app
productName: EventPlayer
directories:
  output: release
files:
  - dist/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
win:
  target: dir
  icon: build/icon.ico
  sign: false
  verifyUpdateCodeSignature: false
  signingHashAlgorithms: []
  signAndEditExecutable: false
  signDlls: false
mac:
  target: dmg
  icon: build/icon.icns
linux:
  target: AppImage
  icon: build/icon.png

